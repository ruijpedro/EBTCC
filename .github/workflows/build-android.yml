name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Prepare web folder
        run: |
          rm -rf www
          mkdir -p www

          cp index.html www/
          cp manifest.json www/
          cp service-worker.js www/

          cp -r src www/src

          if [ -d assets ]; then
            cp -r assets www/assets
          fi

      - name: Add Android platform
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Copy Android Icons
        run: |
          mkdir -p android/app/src/main/res

          cp -r assets/android/mipmap-mdpi android/app/src/main/res/
          cp -r assets/android/mipmap-hdpi android/app/src/main/res/
          cp -r assets/android/mipmap-xhdpi android/app/src/main/res/
          cp -r assets/android/mipmap-xxhdpi android/app/src/main/res/
          cp -r assets/android/mipmap-xxxhdpi android/app/src/main/res/

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EBTCC_APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
