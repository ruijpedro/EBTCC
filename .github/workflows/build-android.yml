name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Prepare web folder
        run: |
          rm -rf www
          mkdir www
          cp index.html manifest.json service-worker.js www/
          cp -r src www/src
          if [ -d assets ]; then cp -r assets www/assets; fi

      - name: Add Android platform
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Apply Android app icon
        run: |
          if [ -d assets/android ]; then
            cp -r assets/android/mipmap-* android/app/src/main/res/
          fi

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Inspecoes_RJP-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
